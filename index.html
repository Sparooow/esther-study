<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAC Oefeningen — Esther</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#D4537E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="cheatsheet-overlay" id="csOverlay">
 <div class="cheatsheet-panel" id="csPanel"></div></div>
<header>
 <div style="cursor:pointer" onclick="showLanding()" title="Accueil"><span class="logo">📚 Esther</span><span class="logo-sub" id="logoSub">Study</span></div>
 <div class="header-right">
 <div class="exam-switcher" id="examSwitcher">
 <button class="exam-btn active" data-exam="1" onclick="switchExam(1)">📕 Exam 1</button>
 <button class="exam-btn" data-exam="2" onclick="switchExam(2)">📗 Exam 2</button></div>
 <div class="subj-divider"></div>
 <button class="btn-cheatsheet" id="btnCS" onclick="toggleCS()">📋 Formulekaart</button>
 <div class="subj-switcher" id="subjSwitcher">
 <button class="subj-btn active" data-subj="home" onclick="switchSubject('home')">🏠</button>
 <button class="subj-btn" data-subj="mac" onclick="switchSubject('mac')">MAC</button>
 <button class="subj-btn" data-subj="omi" onclick="switchSubject('omi')">📘 OmI</button>
 <button class="subj-btn" data-subj="test" onclick="switchSubject('test')">🎓 Test</button>
 <button class="subj-btn" data-subj="theory" onclick="switchSubject('theory')">📖 Théorie</button>
 <button class="subj-btn" data-subj="lvl" onclick="switchSubject('lvl')">📶 Niveaus</button></div>
 <div class="subj-divider"></div>
 <div class="lang-switcher" id="langSwitcher">
 <button class="lang-btn active" onclick="setLang('nl')">NL</button>
 <button class="lang-btn" onclick="setLang('en')">EN</button>
 <button class="lang-btn" onclick="setLang('fr')">FR</button></div>
 <button class="lang-btn" id="syncBtn" onclick="syncLogin()" style="margin-left:8px" title="Synchroniser entre appareils">☁️</button>
 <button class="lang-btn" id="darkBtn" onclick="toggleDark()" title="Mode sombre">🌙</button>
 <button class="lang-btn mute-btn" id="muteBtn" onclick="toggleMute()" title="Sons">🔊</button>
 <span class="xp-chip" id="xpChip" onclick="showLanding()"><span class="lvl" id="xpChipLvl">1</span><span id="xpChipXp">0 XP</span></span></div>
</header>
<div class="global-progress" id="globalProgress">
 <span id="gpLabel">correct beantwoord</span>
 <div class="global-bar"><div class="global-fill" id="globalFill"></div></div>
 <span id="gpCount">0/43</span></div>
<!-- Global landing dashboard -->
<div id="landingWrap" style="display:none">
 <main id="landingArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<!-- MAC wrapper -->
<div id="homeWrap" style="display:none">
 <main id="homeArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<div id="toastWrap"></div>
<canvas id="confettiCanvas" style="display:none"></canvas>
<div id="flashOverlay" class="flash-overlay" style="display:none" onclick="if(event.target===this)closeFlash()">
 <div class="flash-modal">
 <div class="flash-top"><span id="flashCount"></span><button class="lang-btn" onclick="closeFlash()">✕</button></div>
 <div class="flash-card" id="flashCard" onclick="flipFlash()">
 <div class="flash-inner" id="flashInner">
 <div class="flash-face flash-front" id="flashFront"></div>
 <div class="flash-face flash-back" id="flashBack"></div></div></div>
 <div class="flash-actions" id="flashActions"></div></div></div>
<div id="macWrap">
<div class="tabs-container">
 <div class="tabs" id="tabsRow"></div></div>
<main id="mainArea"></main></div>
<!-- OmI wrapper -->
<div id="omiWrap" style="display:none">
<div class="tabs-container">
 <div class="tabs" id="omiTabsRow"></div></div>
<main id="omiArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<!-- Test/Exam wrapper -->
<div id="testWrap" style="display:none">
<div class="tabs-container">
 <div class="tabs" id="testTabsRow"></div></div>
<main id="testArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<!-- Exam 2 — Process Management module (or placeholder if empty) -->
<div id="exam2Wrap" style="display:none">
 <div class="tabs-container" id="pmTabsContainer" style="display:none"><div class="tabs" id="pmTabsRow"></div></div>
 <main id="exam2Area" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<!-- Theory-only revision space -->
<div id="theoryWrap" style="display:none">
<div class="tabs-container">
 <div class="tabs" id="theoryTabsRow"></div></div>
<main id="theoryArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<!-- Levels wrapper -->
<div id="lvlWrap" style="display:none">
<div class="tabs-container">
 <div class="tabs" id="lvlTabsRow"></div></div>
<main id="lvlArea" style="max-width:900px;margin:0 auto;padding:32px 20px"></main></div>
<script src="js/00-data-loader.js"></script>
<script src="js/01-i18n-state.js"></script>
<script src="js/02-answers.js"></script>
<script src="js/03-mac-data.js"></script>
<script src="js/04-mac-render.js"></script>
<script src="js/05-omi.js"></script>
<script src="js/06-subjects-nav.js"></script>
<script src="js/07-exams.js"></script>
<script src="js/08-niveaus-theory.js"></script>
<script src="js/09-home.js"></script>
<script src="js/10-gamification.js"></script>
<script src="js/11-pm.js"></script>
<script src="js/12-open.js"></script>
<script src="js/13-diagrams.js"></script>
<script src="js/14-sync-patches.js"></script>
<script src="js/15-main.js"></script>
</body>
</html>
